info:
  name: Delete Order
  type: http
  seq: 7

http:
  method: DELETE
  url: "{{baseURL}}/api/ecom/order/delete-order/{{orderID}}"
  headers:
    - name: Authorization
      value: "{{token}}"
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "orders": [
          {
            "country": "India",
            "productOrderedId": "6960eae1c941646b7a8b3ed3"
          }
        ]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status code is 200 and deletion is successful", function() {
          const status = res.getStatus();
          expect(status).to.equal(200);

          if (status === 200) {
            const data = res.getBody();
            
            // Verify the success message for the deletion
            expect(data.message).to.equal('Orders Deleted Successfully');
          }
        });
    - type: tests
      code: |-
        // test("Status code is 200 and variables are set", function() {
        //   const status = res.getStatus();
        //   expect(status).to.equal(200);

        //   if (status === 200) {
        //     const data = res.getBody();
        //     bru.setEnvVar("token", data.token);
        //     bru.setEnvVar("userId", data.userId);
        //   }
        // });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
