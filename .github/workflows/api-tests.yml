name: Bruno API Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to run tests against'
        required: true
        default: 'QA'
        type: choice
        options:
          - QA  
          - uat
          - prod

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Bruno Collection
        working-directory: ./api-automation
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'QA' }}"
          # We only need the JUnit XML for this method
          bru run --env $ENV_NAME --reporter-junit api-report.xml
        env:
          token: ${{ secrets.API_TOKEN }}

      - name: Generate HTML Summary from JUnit
        uses: test-summary/action@v2
        if: always()
        with:
          paths: "api-automation/api-report.xml"
          output: "api-automation/summary.html"

      - name: Send Visual Email Report
        uses: dawidd6/action-send-mail@v3
        if: always() 
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "QA Automation Summary: ${{ github.repository }}"
          # We now point to the summary generated from the XML
          html_body: file://api-automation/summary.html
          to: sr.yalluri@gmail.com
          from: Bruno Automation Bot
          attachments: api-automation/api-report.xml