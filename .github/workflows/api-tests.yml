name: Bruno API Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to run tests against'
        required: true
        default: 'QA'
        type: choice
        options:
          - QA  
          - uat
          - prod

# CRITICAL: This allows the JUnit action to write the report to your PR
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Bruno Collection
        working-directory: ./api-automation
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'uat' }}"
          # Corrected flags: --reporter-junit points directly to the file destination
          bru run --env $ENV_NAME --reporter-junit api-report.xml
        env:
          token: ${{ secrets.API_TOKEN }}

      - name: Publish API Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'api-automation/api-report.xml'