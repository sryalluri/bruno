name: Bruno API Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to run tests against'
        required: true
        default: 'QA' # Matches your first option
        type: choice
        options:
          - QA  
          - uat
          - prod

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Bruno Collection
        working-directory: ./api-automation
        run: |
          # Updated default to 'QA' to match your input options
          ENV_NAME="${{ github.event.inputs.environment || 'QA' }}"
          bru run --env $ENV_NAME --reporter-junit api-report.xml
        env:
          token: ${{ secrets.API_TOKEN }}

      - name: Publish API Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'api-automation/api-report.xml'

      # FIXED INDENTATION BELOW
      - name: Send JUnit Report via Email
        uses: dawidd6/action-send-mail@v3
        if: always() 
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "QA Automation Report: ${{ github.repository }} - ${{ github.run_id }}"
          body: |
            The API Automation suite has completed.
            Repository: ${{ github.repository }}
            Workflow Status: ${{ job.status }}
            
            Find the detailed summary in the attached JUnit XML.
          to: sr.yalluri@gmail.com
          from: GitHub Actions Automation
          attachments: api-automation/api-report.xml