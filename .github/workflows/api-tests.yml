name: Bruno API Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to run tests against'
        required: true
        default: 'QA'
        type: choice
        options:
          - QA  
          - uat
          - prod

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Bruno Collection
        working-directory: ./api-automation
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'QA' }}"
          # Generates both JUnit for GitHub and HTML for the Email body
          bru run --env $ENV_NAME --reporter-junit api-report.xml --reporter-html api-report.html
        env:
          token: ${{ secrets.API_TOKEN }}

      - name: Publish API Test Report to GitHub
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'api-automation/api-report.xml'

      - name: Send Visual Email Report
        uses: dawidd6/action-send-mail@v3
        if: always() 
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "QA Automation Summary: ${{ github.repository }}"
          # This reads the HTML file and renders it as the email body
          html_body: file://api-automation/api-report.html
          to: sr.yalluri@gmail.com
          from: Bruno Automation Bot
          # We still attach the XML in case you need the raw data
          attachments: api-automation/api-report.xml