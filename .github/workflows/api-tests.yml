name: Bruno API Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to run tests against'
        required: true
        default: 'uat'
        type: choice
        options:
          - QA
          - uat
          - prod

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Bruno Collection
        # We navigate into the folder and run the CLI there
        working-directory: ./api-automation
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'uat' }}"
          bru run --env $ENV_NAME --reporter junit --output api-report.xml
        env:
          token: ${{ secrets.API_TOKEN }}

      - name: Publish API Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          # Path relative to the root, so include folder name
          report_paths: 'api-automation/api-report.xml'